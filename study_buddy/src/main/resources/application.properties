spring.application.name=study-buddy

# ── MySQL Database ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/studybuddy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# ── Run schema.sql on startup ─────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ── Relevance API ─────────────────────────────────────────────────────────────
relevance.api.url=http://localhost:8001/relevance